<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastrar Filmes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <nav class="navbar" style="background-color: #6b0f0f;">
        <div class="container">
            <a class="navbar-brand bg-danger">CineFlix - Locadora</a>
            <a href="index.html" class="btn bg-danger bg-gradient">Voltar</a>
        </div>
    </nav>
    
    <div class="container mt-5">
        <h2 class="mb-4">Cadastro de Filme</h2>
        <form>
            <div class="mb-3">
                <label class="form-label">Capa do Filme (URL)</label>
                <input type="text" class="form-control" placeholder="Coloque a URL do filme">
            </div>

            <div class="mb-3">
                <label class="form-label">Nome do Filme</label>
                <input type="text" class="form-control" placeholder="Digite o nome do filme">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Gênero</label>
                <select class="form-select">
                    <option>Ação</option>
                    <option>Comédia</option>
                    <option>Drama</option>
                    <option>Terror</option>
                    <option>Ficção Científica</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Ano de Lançamento</label>
                <input type="number" class="form-control" placeholder="Digite o ano do filme">
            </div>

            <div class="mb-3">
                <label class="form-label">Classificação</label>
                <input type="number" class="form-control" placeholder="Coloque a classificação do filme">
            </div>

            <div class="mb-3">
                <label class="form-label">Produtora</label>
                <input type="text" class="form-control" placeholder="Digite a produtora do filme">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea class="form-control" placeholder="Digite a descrição do filme" rows="3"></textarea>
            </div>
            
            <button class="btn btn-success" style="background-color: #6b0f0f;">Cadastrar Filme</button>
        </form>
    </div>

</body>
</html>
